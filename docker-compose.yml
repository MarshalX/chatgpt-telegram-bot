version: '3'
services:
  chatgpt-telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DD_API_KEY=${DD_API_KEY}
      - DD_SITE=${DD_SITE:-datadoghq.eu}
      - DD_SERVICE=${DD_SERVICE:-chatgpt-telegram-bot}
      - DD_LLMOBS_ENABLED=${DD_LLMOBS_ENABLED:-1}
      - DD_LLMOBS_AGENTLESS_ENABLED=${DD_LLMOBS_AGENTLESS_ENABLED:-1}
      - DD_LLMOBS_ML_APP=${DD_LLMOBS_ML_APP:-chatgpt-telegram-bot}
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - dagger-cache:/root/.dagger
    restart: unless-stopped

volumes:
  dagger-cache:
